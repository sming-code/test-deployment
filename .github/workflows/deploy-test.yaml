name: Test deployment playground pipeline.

on:
  workflow_dispatch:
    inputs:
      mixed-case-string:
        type: string
        required: true

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  id-token: write
  contents: read

jobs:
  test-stuff:
    name: Test stuff
    runs-on: ubuntu-latest
    steps:
    - id: get-lower-case
      run: |
        testLower="${${{ inputs.mixed-case-string }},,}"
        echo "$testLower"
