name: Test deployment pipeline.

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      deploy-to-dev:
        description: 'Deploy branch container to dev environment for testing'
        required: false
        type: boolean
        default: false

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  variables:
    name: Generate variables
    runs-on: ubuntu-latest
    steps:
    - uses: sming-code/get-version-no-action@v1
      id: get-version
      with:
        major: 1
        minor: 0
    - name: Display done
      run: echo "Variables loaded..."
    outputs:
      environment: dev
      logical-area: private
      service-name: traveller-svc
      version-no: ${{ steps.get-version.outputs.version-no }}
      last-release-tag: ${{ steps.get-version.outputs.last-release-tag }}
  ca-variables:
    name: Generate container app variables
    needs: [ variables ]
    uses: ./.github/workflows/get-ca-variables.yaml
    with:
      environment: ${{ needs.variables.outputs.environment }}
      logical-area: ${{ needs.variables.outputs.logical-area }}
      service-name: ${{ needs.variables.outputs.service-name }}
      version-no: ${{ needs.variables.outputs.version-no }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_DEV }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  output-for-test:
    name: Output for test
    needs: [ ca-variables ]
    runs-on: ubuntu-latest
    steps:
      - id: output-test
        run: |
          echo "${{ needs.ca-variables.outputs.resource-group-name }}"
          echo "${{ needs.ca-variables.outputs.resource-group-exists }}"
          echo "${{ needs.ca-variables.outputs.container-app-name }}"
          echo "${{ needs.ca-variables.outputs.container-app-id }}"
          echo "${{ needs.ca-variables.outputs.container-app-exists }}"
          echo "${{ needs.ca-variables.outputs.sql-database-name }}"
          echo "${{ needs.ca-variables.outputs.sql-database-id }}"
          echo "${{ needs.ca-variables.outputs.sql-database-exists }}"

  deploy-dev:
    name: Deploy container app and related resources to dev
    needs: [ ca-variables ]
    environment: dev
    runs-on: ubuntu-latest
    if: ${{ (github.ref == 'refs/heads/main') || (inputs.deploy-to-dev == true) }}
    steps:
    - uses: ./../.github/actions/deploy-container-app
      with:
        environment: dev
        resource-group-name: ${{ needs.ca-variables.outputs.resource-group-name }}
        resource-group-exists: ${{ needs.ca-variables.outputs.resource-group-exists }}
        container-app-name: ${{ needs.ca-variables.outputs.container-app-name }}
        container-app-id: ${{ needs.ca-variables.outputs.container-app-id }}
        container-app-exists: ${{ needs.ca-variables.outputs.container-app-exists }}
        sql-database-name: ${{ needs.ca-variables.outputs.sql-database-name }}
        sql-database-id: ${{ needs.ca-variables.outputs.sql-database-id }}
        sql-database-exists: ${{ needs.ca-variables.outputs.sql-database-exists }}
        azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
        azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
