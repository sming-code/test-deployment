name: Deploy container app
description: 'Deploy a container app and associated resources to azure'
inputs:
  subscription:
    description: The subscription to add the resource group to
    required: true
  environment:
    description: The environment being deployed to
    required: true
  resource-group-name:
    description: The name of the resource group to deploy associated resources to where possible.
    required: true
  resource-group-exists:
    description: The name of the resource group to deploy associated resources to where possible.
    required: true
  container-app-name:
    description: The resource name for the container app.
    required: true
  container-app-id:
    description: The id of the existing container app - if it exists
    required: true
  container-app-exists:
    description: Whether the container app currently exists
    required: true
  sql-database-name:
    description: The resource name for the sql database.
    required: true
  sql-database-id:
    description: The id of the existing sql database - if it exists
    required: true
  sql-database-exists:
    description: Whether the sql database currently exists
    required: true
  azure-client-id:
    description: Client id to use for azure auth
    required: true
  azure-tenant-id:
    description: Tenant id to use for azure auth
    required: true
  azure-subscription-id:
    description: Subscription id to use for azure auth
    required: true
runs:
  using: "composite"
  steps:
  - name: ensure-resource-group
    shell: bash
    run: |
      if [[ $Resource_Group_Exists == 0 ]]; then
        az group create $Resource_Group_Name -l uksouth --subscription ${{ inputs.subscription }}
      fi
    env:
      Resource_Group_Name: ${{ inputs.resource-group-name }}
      Resource_Group_Exists: ${{ inputs.resource-group-exists }}

