name: Deploy container app
description: 'Deploy a container app and associated resources to azure'

runs:
  using: "composite"
  steps:
  - name: ensure-resource-group
    if: ${{ env.resource-group-exists == 0 }}
    shell: bash
    run: |
      az group create -n ${{ env.resource-group-name }} -l uksouth --subscription ${{ env.subscription }}

  - name: get-container-app-required-variables
    id: container-app-required-variables
    shell: bash
    run: |
      caeId="$(az containerapp env list -g rg-dev-tag --query '[?name==`'${{ env.container-app-environment-name }}'`].id | [0]')"
      echo "$caeId"
      echo "cae-id=$caeId" >> $GITHUB_OUTPUT

  - name: ensure-container-app-exists
    if: ${{ env.container-app-exists == 0 }}
    uses: azure/bicep-deploy@v2
    with:
      type: deployment
      operation: create
      name: deploy-empty-container-app
      scope: resourceGroup
      subscription-id: ${{ env.subscription-id }}
      resource-group-name: ${{ env.resource-group-name }}
      template-file: ./.github/workflows/bicep/create-empty-container-app.bicep
      parameters: |
        environment: ${{ env.environment-name }}
        environment_resource_group_name: ${{ env.environment-resource-group-name }}
        container_app_environment_id: ${{ steps.container-app-required-variables.outputs.cae-id }}
        container_app_name: ${{ env.container-app-name }}
        ghcr_username: ${{ env.ghcr-username }}
        ghcr_token: ${{ env.ghcr-token }}

  - name: get-container-app-principal-id
    id: container-app-principal-id
    shell: bash
    run: |
      principalId="$(az containerapp show --name ${{ env.container-app-name }} -g ${{ env.resource-group-name }} --query 'identity.principalId')"
      echo "$principalId"
      echo "principal-id=$principalId" >> $GITHUB_OUTPUT

  - name: ensure-sql-database-exists
    if: ${{ env.sql-database-exists == 0 }}
    uses: azure/bicep-deploy@v2
    with:
      type: deployment
      operation: create
      name: deploy-new-sql-database
      scope: resourceGroup
      subscription-id: ${{ env.subscription-id }}
      resource-group-name: rg-dev-tag
      template-file: ./.github/workflows/bicep/create-database.bicep
      parameters: |
        environment_resource_group_name: ${{ env.environment-resource-group-name }}
        database_name: ${{ env.sql-database-name }}
        server_name: ${{ env.sql-server-name }}
        container_app_principal_id: ${{ steps.container-app-principal-id.outputs.principal-id }}

  - name: ensure-container-app-access
    if: ${{ env.sql-database-exists == 0 }}
    uses: azure/sql-action@v2.3
    with:
      connection-string: "Server=tcp:${{ env.sql-server-name }}.database.windows.net,1433;Initial Catalog=${{ env.sql-database-name }};Authentication=Active Directory Default;Encrypt=True;"
      path: ./.github/workflows/initialize-user.sql
      arguments: '-v CaName=${{ env.container-app-name }}'
